{
  "jobs": [
    {
      "name": "init-hitrace",
      "cmds": [
        "chmod 0755 /sys/kernel/tracing/events/hmfs/hmfs_read_enter",
        "chmod 0755 /sys/kernel/tracing/events/hmfs/hmfs_write_enter"
      ]
    },
    {
      "name": "pre-init",
      "condition": "boot && const.debuggable=1",
      "cmds": [
        "chmod 0755 /sys/kernel/debug/tracing/events/hmfs/hmfs_read_enter",
        "chmod 0755 /sys/kernel/debug/tracing/events/hmfs/hmfs_write_enter"
      ]
    }
  ]
}
